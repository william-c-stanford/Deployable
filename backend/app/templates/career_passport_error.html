<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Deployable Career Passport</title>
    <style>
        :root {
            --bg-primary: #0a0a0b;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #3b82f6;
            --danger: #ef4444;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 16px;
            width: 100%;
        }

        .brand-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            margin-bottom: 20px;
        }

        .brand-logo {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--accent);
        }

        .brand-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 40px 20px;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 14px;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-bar">
            <div class="brand-logo">Deployable</div>
            <div class="brand-label">Career Passport</div>
        </div>

        <div class="error-container">
            <div class="error-icon">{{ icon }}</div>
            <div class="error-title">{{ title }}</div>
            <div class="error-message">{{ message }}</div>
        </div>
    </div>
</body>
</html>
